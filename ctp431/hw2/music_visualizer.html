<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualizer</title>
	</head>

  <style>
  .loader {
    border: 16px solid #000000;
    border-radius: 50%;
    border-top: 16px solid #262626;
    width: 120px;
    height: 120px;
    animation: spin 2s linear infinite;

    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    div#ref{
      position: fixed;
      bottom: 0;
      right: 30px;
      }

    div#ref2{
      position: fixed;
      bottom: 0;
      left: 30px;
      }

    div#loader{
      position: fixed;
      bottom: 40%;
      left: 47%;
      }
  </style>
  <script src="p5.min.js"></script>
  <script src="p5.dom.min.js"></script>
  <script src="p5.sound.min.js"></script>
	<script src="visualizer.js"></script>


  <body style="background-color:RGB(0,0,0);">

	<h1 style="text-align: center; font-size:100px; font-family:Serif; color:RGB(50,50,50);"> R  o  b  u  s  t </h1>
  <div id="ref" align="left">
    <p style="text-align: left; font-size:8px; font-family:Serif; color:RGB(130,130,130);">
      <br>
      BGM1 : Migos - Slippery
      <br>
      BGM2 : j^p^n - wrong
      <br>
      BGM3 : Drezo - Malice
    </p>
  </div>

  <div id="ref2" align="left">
    <p style="text-align: left; font-size:8px; font-family:Serif; color:RGB(130,130,130);">
      Influenced by https://p5js.org/examples/3d-sine-cosine-in-3d.html
    </p>
  </div>

  <div class="loader" id="loader"></div>
  </body>
</html>
